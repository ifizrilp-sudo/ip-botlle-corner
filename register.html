<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - IP Bottle Corner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <div class="logo">
          <i class="fas fa-wine-bottle"></i>
          <h1>IP Bottle <span>Corner</span></h1>
        </div>
        <h2>Daftar Akun</h2>
        <p>Bergabunglah dengan komunitas pecinta minuman keras premium</p>
      </div>

      <form id="registerForm" onsubmit="registerUser(event)">
        <div class="form-group">
          <label for="fullname">Nama Lengkap</label>
          <input type="text" id="fullname" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Masukkan email" required>
        </div>
        <div class="form-group">
          <label for="phone">Nomor Telepon</label>
          <input type="tel" id="phone" placeholder="Masukkan nomor telepon" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimal 8 karakter" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Konfirmasi Password</label>
          <input type="password" id="confirm-password" placeholder="Konfirmasi password" required>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" required> Saya setuju dengan <a href="#">Syarat & Ketentuan</a>
          </label>
        </div>
        <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Daftar</button>
      </form>

      <div class="auth-footer">
        <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
